name: ci

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  windows:
    name: Windows build and public check
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Public check
        shell: pwsh
        run: .\scripts\public-check.ps1

      - name: Package preview
        shell: pwsh
        run: .\scripts\package-preview.ps1 -Version "ci"

      - name: Check preview pack exists
        shell: pwsh
        run: |
          if (-not (Test-Path ".\artifacts\preview\AI-Workbox-Preview-Pack-ci.zip")) {
            throw "Preview pack was not created."
          }
